<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">

  <style>

    /* Popup layout */

    body {
      margin:0;
      padding:18px;
      width:260px;
      font-family:Inter, Arial, sans-serif;
      background:#F9F4EC;
    }

    .logo {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-bottom:18px;
      }

    .logo img {
      width:30px;
      height:30px;
    }

    .logo span {
      font-size:22px;
      font-weight:700;
      color:#3C342F;
    }

    /* Main action button */

    button {
      width:100%;
      height:46px;
      border-radius:10px;
      border:1px solid #D4C8BA;
      background:#FFFFFF;
      color:#3C342F;
      font-size:15px;
      font-weight:500;
      font-family:inherit;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:.15s;
    }

    button:hover {
      background:#EFE1CE;
      border-color:#B89E7A;
    }

    button:active {
      transform:scale(.98);
    }

    .icon {
      width:18px;
      height:18px;
    }

  </style>

</head>

<body>

  <!-- Extension header -->

  <div class="logo">

    <img src="../reader/icons/logo.svg" alt="Logo">

    <span>InclusiWeb</span>

  </div>

  <!-- Opens Reader Mode -->

  <button id="openReader">

    <img class="icon" src="../reader/icons/popup.svg" alt="">

    Abrir Leitor

  </button>

  <script src="popup.js"></script>

</body>
</html>
