<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InclusiWeb Reader</title>

    <style>

        /* Base layout */

        body {
            margin: 0;
            padding-top: 140px;
            font-family: Inter, Arial, sans-serif;
            background: #F9F4EC;
            color: #3C342F;
            line-height: 1.8;
        }

        h1,
        #content {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 24px;
        }

        p.reader-paragraph {
            margin-bottom: 20px;
        }

        #content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 20px 0;
        }

        /* Toolbar */

        .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: #E6D7C3;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 14px 32px 18px;
            box-sizing: border-box;
            border-bottom: 1px solid #D3C4B2;
            box-shadow: 0 1px 2px rgba(0,0,0,.03);
            z-index: 9999;
        }

        .logo {
            display:flex;
            align-items:center;
            gap:10px;
            margin-bottom:14px;
        }

        .logo img {
            width: 34px;
            height: 34px;
        }

        .logo span {
            font-size: 24px;
            font-weight: 700;
            color: #3C342F;
        }

        /* Button groups */

        .toolbar-buttons {
            display: flex;
            align-items: center;
            gap: 48px;
            margin-top: -8px;
            margin-left: 43px;
            flex-wrap: nowrap;
        }

        .group {
            display: flex;
            gap: 10px;
        }

        button {
            height: 44px;
            padding: 0 16px;
            border-radius: 10px;
            border: 1px solid #D4C8BA;
            background: #FFF;
            color: #3C342F;
            font-size: 15px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: .15s;
        }

        button:hover {
            background:#EFE1CE;
            border-color:#B89E7A;
        }

        button:active {
            transform: scale(.97);
        }
        
        button.active{
            background:#EFE1CE;
            border:2px solid #8B6B4A;
            color:#3C342F;
        }

        .icon {
            width: 18px;
            height: 18px;
            margin: 0;
            flex-shrink: 0;
        }

        /* High contrast mode */

        body.contrast {
            background: #111111 !important;
            color: #F7E06D !important;
        }

        body.contrast h1,
        body.contrast .reader-paragraph {
            color: #F7E06D !important;
        }

        body.contrast .toolbar {
            background: #1D1F22;
            border-bottom: 1px solid #383D44;
            box-shadow: 0 1px 2px rgba(0,0,0,.25);
        }

        body.contrast button {
            background: #30343A;
            color: #F7E06D;
            border-color: #555;
        }

        body.contrast .logo span {
            color: #F7E06D;
        }

        body.contrast button:hover {
            background: #474C55;
        }

        body.contrast button.active{
            background:#474C55;
            border: 2px solid #F7E06D;
            color:#111111;
        }

        body.contrast button.active span {
            color:#F7E06D;
        }

        /* Dyslexia mode */

        body.dyslexia {
            font-family: Arial, sans-serif !important;
            letter-spacing: .07em;
            word-spacing: .15em;
        }

        /* Reading highlight */

        .highlight {
            background: #F5E6A8 !important;
            color: #000 !important;
            border-radius: 6px;
            padding: 2px 4px;
            box-shadow:none;
        }

        body.contrast .highlight {
            background: #F7E06D !important;
            color: #2D3139 !important;
            box-shadow: 0 0 0 2px #F7E06D;
        }

    </style>
</head>

<body>

    <!-- Accessibility toolbar -->

    <div class="toolbar">

        <div class="logo">
            <img src="icons/logo.svg" alt="Logo">
            <span>InclusiWeb</span>
        </div>

        <div class="toolbar-buttons">

            <!-- Text accessibility -->

            <div class="group">
                <button id="btnAplus">
                    <img class="icon" src="icons/increase.svg" alt="">
                    <span>Aumentar Fonte</span>
                </button>

                <button id="btnAminus">
                    <img class="icon" src="icons/decrease.svg" alt="">
                    <span>Diminuir Fonte</span>
                </button>

                <button id="btnDyslexia">
                    <img class="icon" src="icons/dyslexia.svg" alt="">
                    <span>Fonte para Dislexia</span>
                </button>
            </div>

            <!-- Reading controls -->

            <div class="group">
                <button id="btnReadAll">
                    <img class="icon" src="icons/read.svg" alt="">
                    <span>Ler Página</span>
                </button>

                <button id="btnStop">
                    <img class="icon" src="icons/stop.svg" alt="">
                    <span>Parar Leitura</span>
                </button>

                <button id="btnToggleHover">
                    <img class="icon" src="icons/hover.svg" alt="">
                    <span>Ler ao Passar</span>
                </button>
            </div>

            <!-- Display -->

            <div class="group">
                <button id="btnContrast">
                    <img class="icon" src="icons/contrast.svg" alt="">
                    <span>Modo Contraste</span>
                </button>
            </div>

        </div>

    </div>

    <h1 id="title"></h1>

    <div id="content"></div>

    <script src="reader.js"></script>

</body>

</html>
