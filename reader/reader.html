<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InclusiWeb Reader</title>
    <style>

        body{margin:0;padding-top:150px;font-family:Inter,Arial,sans-serif;background:#F9F4EC;color:#3C342F;line-height:1.8}

        h1,#content{max-width:760px;margin:0 auto;padding:0 24px}

        h1{font-size:2rem;margin-bottom:24px}

        p.reader-paragraph{margin-bottom:20px}

        #content img{max-width:100%;height:auto;border-radius:8px;margin:20px 0}

        .toolbar{position:fixed;top:0;left:0;right:0;height:130px;background:#E6D7C3;display:flex;flex-direction:column;justify-content:center;padding:18px 32px;box-sizing:border-box;box-shadow:0 2px 6px rgba(0,0,0,.08);z-index:9999}

        .logo{display:flex;align-items:center;gap:10px;margin-bottom:18px}
        .logo img{width:34px;height:34px}

        .logo span{font-size:24px;font-weight:700;color:#3C342F}

        .toolbar-buttons{display:flex;gap:12px;flex-wrap:wrap;align-items:center}

        button{height:44px;padding:0 16px;border-radius:10px;border:1px solid #D4C8BA;background:#FFF;color:#3C342F;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.15s}

        button:hover{background:#F3E7D7}button:active{transform:scale(.97)}

        .icon{width:18px;height:18px;margin:0;flex-shrink:0}

        body.contrast{background:#121316!important;color:#F7E06D!important}

        body.contrast h1,body.contrast .reader-paragraph{color:#F7E06D!important}

        body.contrast .toolbar{background:#1E2126}

        body.contrast button{background:#2D3139;color:#F7E06D;border-color:#555}

        body.contrast button:hover{background:#40454F}

        body.dyslexia{font-family:Arial,sans-serif!important;letter-spacing:.07em;word-spacing:.15em}

        .highlight{background:#FEFCBF!important;color:#000!important;border-radius:4px;padding:2px 4px;box-shadow:0 0 0 2px #FAF089}

        body.contrast .highlight{background:#2D3139!important;color:#F7E06D!important;box-shadow:0 0 0 2px #F7E06D}

    </style>
</head>

<body>

<div class="toolbar">
<div class="logo"><img src="icons/logo.svg" alt="Logo"><span>InclusiWeb</span></div>

<div class="toolbar-buttons">

<button id="btnAplus"><img class="icon" src="icons/increase.svg" alt=""><span>Aumentar Fonte</span></button>
<button id="btnAminus"><img class="icon" src="icons/decrease.svg" alt=""><span>Diminuir Fonte</span></button>
<button id="btnDyslexia"><img class="icon" src="icons/dyslexia.svg" alt=""><span>Modo Dislexia</span></button>
<button id="btnContrast"><img class="icon" src="icons/contrast.svg" alt=""><span>Modo Contraste</span></button>
<button id="btnReadAll"><img class="icon" src="icons/read.svg" alt=""><span>Ler Página</span></button>
<button id="btnStop"><img class="icon" src="icons/stop.svg" alt=""><span>Parar Leitura</span></button>
<button id="btnToggleHover"><img class="icon" src="icons/hover.svg" alt=""><span>Hover ON</span></button>

</div>
</div>
<h1 id="title"></h1><div id="content"></div><script src="reader.js"></script>

</body>
</html>
